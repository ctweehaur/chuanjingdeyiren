<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互动古文：穿井得一人 · 吕氏春秋</title>
    <link rel="stylesheet" href="classic_style.css">
    <script src="chuanjingdeyiren_text.js"></script>
    <script src="chuanjingdeyiren_translation.js"></script>
    <script src="chuanjingdeyiren_analysis.js"></script>
    <script src="chuanjingdeyiren_quiz.js"></script>
    <script src="chuanjingdeyiren_shortq.js"></script>
</head>
<body>
 
<div class="app-container">
    <div class="header-section">
        <h1 class="title">穿井得一人</h1>
        <p class="author">《吕氏春秋·察今》 / 吕不韦 (先秦)</p>
    </div>
    
    <div class="poem-container">
        <div id="dynamic-poem-container"></div>
        <div class="translation-block" id="translationBlock">
            <div class="translation-header" id="translationHeader">
                <div class="translation-title"><span>📖</span> 白话翻译</div>
                <div class="toggle-icon" id="toggleIcon">▶</div>
            </div>
            <div class="translation-content" id="translationContent"></div>
        </div>
    </div>
    
    <div class="controls-wrapper">
        <div class="control-panel"><div class="control-label">🗣️ 拼音辅助</div><label class="switch"><input type="checkbox" id="pinyin-toggle"><span class="slider"></span></label></div>
        <div class="control-panel"><div class="control-label">🔤 英文辅助</div><label class="switch"><input type="checkbox" id="en-toggle"><span class="slider"></span></label></div>
    </div>

    <div class="action-group">
        <button class="action-btn btn-analysis" id="toggle-analysis-btn">📜 展开全诗赏析</button>
        <button class="action-btn btn-quiz" id="toggle-quiz-btn">🎯 客观题自测</button>
        <button class="action-btn btn-shortq" id="toggle-shortq-btn">✍️ 简答题特训</button>
    </div>
 
    <div class="collapsible-content" id="analysis-content"></div>
    <div class="collapsible-content" id="quiz-content"><div id="quiz-dynamic-container"></div></div>
    <div class="collapsible-content" id="shortq-content"></div>
</div>
 
<div class="floating-tooltip" id="tooltip">
    <div class="exp-header"><span class="exp-word" id="disp-word"></span><span class="exp-pinyin" id="disp-pinyin"></span></div>
    <div class="exp-zh" id="disp-zh"></div>
    <div class="exp-en" id="disp-en"></div>
</div>
 
<script>
    let originalQuizQuestions = [];

    function alignText(zh, py) {
        if (!zh) return '';
        const chars = zh.trim().split('');
        const pys = py ? py.trim().split(/\s+/) : [];
        let pIdx = 0;
        let html = '';
        for (let c of chars) {
            if (/[，。？！：“”‘’（）《》、\-\:]/.test(c)) {
                html += `<span class="punctuation">${c}</span>`;
            } else {
                const p = pys[pIdx] || '';
                html += `<span class="char-box"><span class="py-text">${p}</span><span class="zh-text">${c}</span></span>`;
                pIdx++;
            }
        }
        return html;
    }

    window.onload = function() {
        if (typeof quizQuestions !== 'undefined') originalQuizQuestions = JSON.parse(JSON.stringify(quizQuestions));
        renderPoem(); renderTranslation(); renderAnalysis(); renderShortQ(); renderQuizCards(); initInteractions();
    };

    function renderPoem() {
        const container = document.getElementById('dynamic-poem-container');
        let html = '<div class="poem-paragraph">&emsp;&emsp;';
        poemData.forEach(w => {
            if(w.punc) html += `<span class="punctuation">${w.text.trim()}</span>`;
            else html += `<span class="word" data-text="${w.text.trim()}" data-pinyin="${w.py}" data-zh="${w.zh}" data-en="${w.en}"> ${alignText(w.text, w.py)}</span>`;
        });
        container.innerHTML = html + '</div>';
    }

    function renderTranslation() {
        const container = document.getElementById('translationContent');
        let html = '';
        translationData.forEach((item, index) => {
            if(index > 0) html += '<div class="trans-divider"></div>';
            html += `<div class="trans-text-line"><div class="trans-zh">${alignText(item.zh, item.py)}</div><div class="trans-en">${item.en}</div></div>`;
        });
        container.innerHTML = html;
    }

    function renderAnalysis() {
        const container = document.getElementById('analysis-content');
        let html = '';
        analysisData.forEach(item => {
            html += `<div class="analysis-card"><div class="ana-title-group"><h4>${alignText(item.header, item.headerPy)}</h4><div class="ana-en">${item.en}</div></div><div class="ana-text-group"><p>${alignText(item.textZh, item.textPy)}</p><div class="ana-en">${item.textEn}</div></div></div>`;
        });
        container.innerHTML = html;
    }

    function renderShortQ() {
        const container = document.getElementById('shortq-content');
        let html = '';
        shortQData.forEach(item => {
            html += `<div class="sa-card"><h4>${item.id}. ${alignText(item.qZh, item.qPy)}</h4><div class="q-en">${item.qEn}</div><button class="sa-answer-btn" onclick="toggleAnswer(this)">📖 查看答案</button><div class="sa-answer-box"><div class="sa-zh">${alignText(item.aZh, item.aPy)}</div><div class="sa-en">${item.aEn}</div></div></div>`;
        });
        container.innerHTML = html;
    }

    function renderQuizCards() {
        const container = document.getElementById('quiz-dynamic-container');
        if (!container || originalQuizQuestions.length === 0) return;
        container.innerHTML = '';
        const currentQuestions = JSON.parse(JSON.stringify(originalQuizQuestions));
        currentQuestions.sort(() => Math.random() - 0.5);
        
        currentQuestions.forEach(q => {
            q.options.sort(() => Math.random() - 0.5);
            const card = document.createElement('div');
            card.className = 'quiz-card';
            let optionsHtml = '';
            const letters = ['A.', 'B.', 'C.', 'D.'];
            
            q.options.forEach((opt, idx) => {
                optionsHtml += `
                    <button class="option-btn" data-correct="${opt.correct}">
                        <div style="display: flex; align-items: flex-start; width: 100%;">
                            <span style="font-weight:bold; margin-right:8px;">${letters[idx]}</span>
                            <span>${alignText(opt.text, opt.py)}</span>
                        </div>
                        <div class="trans-en" style="width:100%; margin-left:28px; margin-top:6px; color:#64748b;">${opt.en}</div>
                    </button>`;
            });
            
            card.innerHTML = `<div style="margin-bottom:12px;"><strong>${q.id}.</strong> ${alignText(q.text, q.py)}<div class="trans-en" style="margin-left:20px; color:#94a3b8;">${q.en}</div></div>${optionsHtml}<div class="feedback"></div>`;
            container.appendChild(card);
            
            card.querySelectorAll('.option-btn').forEach(btn => {
                btn.onclick = function() {
                    if (this.parentElement.querySelector('.option-btn[disabled]')) return;
                    card.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
                    const isCorrect = this.getAttribute('data-correct') === 'true';
                    this.style.background = isCorrect ? '#dcfce7' : '#fee2e2';
                    card.querySelector('.feedback').innerHTML = isCorrect ? '✅ 正确！' : '❌ 错误。';
                };
            });
        });
    }

    function initInteractions() {
        document.getElementById('pinyin-toggle').onchange = e => document.body.classList.toggle('hide-pinyin', !e.target.checked);
        document.getElementById('en-toggle').onchange = e => document.body.classList.toggle('hide-english', !e.target.checked);
        document.body.classList.add('hide-pinyin', 'hide-english');
        
        // 模态框逻辑
        document.querySelectorAll('.word').forEach(w => {
            w.onclick = function(e) {
                const tt = document.getElementById('tooltip');
                document.getElementById('disp-word').innerText = this.getAttribute('data-text');
                document.getElementById('disp-pinyin').innerText = this.getAttribute('data-pinyin');
                document.getElementById('disp-zh').innerText = this.getAttribute('data-zh');
                document.getElementById('disp-en').innerText = this.getAttribute('data-en');
                tt.style.display = 'block';
                tt.style.left = e.pageX + 'px';
                tt.style.top = e.pageY + 20 + 'px';
            };
        });
    }

    function toggleAnswer(btn) {
        const box = btn.nextElementSibling;
        box.style.display = box.style.display === 'block' ? 'none' : 'block';
    }
</script>
</body>
</html>
