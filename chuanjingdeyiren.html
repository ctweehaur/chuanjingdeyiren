<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互动古文平台</title>
    
    <!-- 🎨 1. 引入统一的全局 CSS 皮肤文件 -->
    <link rel="stylesheet" href="classic_style.css">

    <!-- 🗄️ 2. 全英文数据包引用 -->
    <script src="chuanjingdeyiren_text.js"></script>
    <script src="chuanjingdeyiren_translation.js"></script>
    <script src="chuanjingdeyiren_analysis.js"></script>
    <script src="chuanjingdeyiren_quiz.js"></script>
    <script src="chuanjingdeyiren_shortq.js"></script>
</head>
<body>
 
<div class="app-container">
    <!-- 头部栏 -->
    <div class="header-section" id="dynamic-header"></div>
    
    <!-- 正文与分词栏 -->
    <div class="poem-container">
        <!-- 💡 真正的一整段流式排版 -->
        <p class="poem-paragraph" id="dynamic-poem-paragraph"></p>
        
        <!-- 白话翻译栏 -->
        <div class="translation-block" id="translationBlock">
            <div class="translation-header" id="translationHeader">
                <div class="translation-title"><span>📖</span> 白话翻译</div>
                <div class="toggle-icon" id="toggleIcon">▶</div>
            </div>
            <div class="translation-content" id="translationContent"></div>
        </div>
    </div>
    
    <!-- 全局控制面板 -->
    <div class="controls-wrapper">
        <div class="control-panel"><div class="control-label">🗣️ 拼音辅助 <span>(Pinyin)</span></div><label class="switch"><input type="checkbox" id="pinyin-toggle"><span class="slider"></span></label></div>
        <div class="control-panel"><div class="control-label">🔤 英文辅助 <span>(English)</span></div><label class="switch"><input type="checkbox" id="en-toggle"><span class="slider"></span></label></div>
    </div>

    <!-- 功能按钮 -->
    <div class="action-group">
        <button class="action-btn btn-analysis" id="toggle-analysis-btn"><span class="btn-icon">📜</span> 展开全诗赏析</button>
        <button class="action-btn btn-quiz" id="toggle-quiz-btn"><span class="btn-icon">🎯</span> 客观题自测</button>
        <button class="action-btn btn-shortq" id="toggle-shortq-btn"><span class="btn-icon">✍️</span> 简答题特训</button>
    </div>
 
    <!-- 赏析面板 -->
    <div class="collapsible-content" id="analysis-content"></div>
    
    <!-- 客观题自测面板 -->
    <div class="collapsible-content" id="quiz-content">
        <div id="quiz-dynamic-container"></div>
    </div>
    
    <!-- 简答题自测面板 -->
    <div class="collapsible-content" id="shortq-content"></div>
</div>
 
<!-- 全局悬浮气泡卡片 -->
<div class="floating-tooltip" id="tooltip">
    <div class="exp-header"><span class="exp-word" id="disp-word"></span><span class="exp-pinyin" id="disp-pinyin"></span><span class="exam-tag" id="exam-tag">考点</span></div>
    <div class="exp-zh" id="disp-zh"></div>
    <div class="exp-en" id="disp-en"></div>
</div>
 
<script>
    window.onload = function() {
        renderHeaderAndPoem();
        renderTranslation();
        renderAnalysis();
        renderQuizCards();
        renderShortQ();
        initCoreInteractions();
    };

    // ==================== 1. 正文（古文原文）渲染 ====================
    function renderHeaderAndPoem() {
        document.getElementById('dynamic-header').innerHTML = `
            <h1 class="title">${poemData.title}</h1>
            <p class="author">${poemData.author}</p>
        `;
        
        const paragraphContainer = document.getElementById('dynamic-poem-paragraph');
        paragraphContainer.innerHTML = '';
        
        poemData.lines.forEach(line => {
            line.words.forEach(word => {
                if(word.isPunctuation) {
                    const span = document.createElement('span');
                    span.className = 'punctuation';
                    span.innerText = word.text;
                    paragraphContainer.appendChild(span);
                } else {
                    const span = document.createElement('span');
                    span.className = `word ${word.examFocus ? 'exam-focus' : ''}`;
                    span.innerText = word.text;
                    span.setAttribute('data-pinyin', word.pinyin);
                    span.setAttribute('data-zh', word.zh);
                    span.setAttribute('data-en', word.en);
                    if(word.exam) span.setAttribute('data-exam', 'true');
                    paragraphContainer.appendChild(span);
                }
            });
        });
    }

    // ==================== 2. 白话翻译渲染 ====================
    function renderTranslation() {
        const container = document.getElementById('translationContent');
        container.innerHTML = '';
        
        translationData.forEach((item, index) => {
            const pyWords = item.py.split(/\s+/).filter(p => p.trim() !== '' && !/[，。？！：“”‘’（）；、！,;.?!"']/.test(p));
            const zhChars = Array.from(item.zh).filter(c => c.trim() !== ''); 
            
            let rubyGroupHtml = '';
            let pyIdx = 0;
            
            zhChars.forEach((zh) => {
                const isPunc = /[，。？！：“”‘’（）；、！,;.?!"']/.test(zh);
                let currentPy = '&nbsp;';
                
                if (!isPunc) {
                    if (pyIdx < pyWords.length) {
                        currentPy = pyWords[pyIdx];
                        pyIdx++;
                    }
                }
                
                rubyGroupHtml += `
                    <div class="ruby-item">
                        <div class="trans-py">${isPunc ? '&nbsp;' : currentPy}</div>
                        <div class="trans-zh-char">${zh}</div>
                    </div>
                `;
            });

            container.innerHTML += `
                <div class="trans-text-line">
                    <div class="trans-ruby-wrapper">${rubyGroupHtml}</div>
                    <div class="trans-en">${item.en}</div>
                </div>
                ${index < translationData.length - 1 ? '<div class="trans-divider"></div>' : ''}
            `;
        });
    }

    // ==================== 3. 全诗赏析渲染（含符号强力过滤） ====================
    function renderAnalysis() {
        const container = document.getElementById('analysis-content');
        container.innerHTML = "";
        
        analysisData.forEach(card => {
            const titlePyWords = card.py.split(/\s+/).filter(p => p.trim() !== "");
            const titleZhChars = Array.from(card.header).filter(c => c.trim() !== "");
            let titleRubyHtml = "";
            titleZhChars.forEach((zh, idx) => {
                titleRubyHtml += `
                    <div class="ruby-item">
                        <div class="trans-py">${titlePyWords[idx] || '&nbsp;'}</div>
                        <div class="trans-zh-char" style="font-size:18px; font-weight:bold; color:var(--text-poem);">${zh}</div>
                    </div>
                `;
            });

            let paragraphsHtml = "";
            card.contents.forEach(line => {
                // 💡 彻底屏蔽列表点符号、数字编号和方向箭头
                const linePyWords = line.py.split(/\s+/).filter(p => p.trim() !== '' && !/[，。？！：“”‘’（）；、！,;.?!"'🏷️❶❷❸❹➔•·]/u.test(p));
                const lineZhChars = Array.from(line.zh).filter(c => c.trim() !== '');
                
                let linerRubyHtml = "";
                let pyIdx = 0;
                
                lineZhChars.forEach((zh) => {
                    const isPuncOrSymbol = /[，。？！：“”‘’（）；、！,;.?!"'🏷️❶❷❸❹➔•·]/u.test(zh);
                    let currentPy = '&nbsp;';
                    
                    if (!isPuncOrSymbol) {
                        if (pyIdx < linePyWords.length) {
                            currentPy = linePyWords[pyIdx];
                            pyIdx++;
                        }
                    }
                    
                    linerRubyHtml += `
                        <div class="ruby-item">
                            <div class="trans-py">${isPuncOrSymbol ? '&nbsp;' : currentPy}</div>
                            <div class="trans-zh-char">${zh}</div>
                        </div>
                    `;
                });

                paragraphsHtml += `
                    <div class="trans-text-line" style="margin-bottom: 20px;">
                        <div class="trans-ruby-wrapper">${linerRubyHtml}</div>
                        <div class="trans-en">${line.en}</div>
                    </div>
                `;
            });

            container.innerHTML += `
                <div class="analysis-card" style="padding: 30px; background:var(--card-bg); border-radius:var(--border-radius-md); margin-bottom:18px; border-left:5px solid var(--accent-green); box-shadow:var(--shadow-soft);">
                    <div class="ana-title-group" style="display:flex; flex-direction:column; align-items:flex-start; gap:4px; margin-bottom:15px; border-bottom:1px dashed #cbd5e1; padding-bottom:10px;">
                        <div class="trans-ruby-wrapper">${titleRubyHtml}</div>
                        <div class="ana-en" style="margin-top:2px; font-weight:600; color:var(--text-secondary); font-style: normal;">${card.en}</div>
                    </div>
                    <div>${paragraphsHtml}</div>
                </div>
            `;
        });
    }

    // ==================== 4. 客观题自测渲染（包含解析对齐） ====================
    function renderQuizCards() {
        const container = document.getElementById('quiz-dynamic-container');
        if (!container) return;
        container.innerHTML = '';
        
        quizQuestions.forEach(q => {
            const qPyWords = q.py.split(/\s+/).filter(p => p.trim() !== '' && !/[，。？！：“”‘’（）；、？0-9.、A-D]/u.test(p));
            const qZhChars = Array.from(q.text).filter(c => c.trim() !== '');
            let qRubyHtml = '';
            let qPyIdx = 0;
            
            qZhChars.forEach((zh) => {
                const isPunc = /[，。？！：“”‘’（）；、 ？0-9.、A-D]/u.test(zh);
                let currentPy = '&nbsp;';
                if (!isPunc && qPyIdx < qPyWords.length) {
                    currentPy = qPyWords[qPyIdx];
                    qPyIdx++;
                }
                qRubyHtml += `
                    <div class="ruby-item">
                        <div class="trans-py">${isPunc ? '&nbsp;' : currentPy}</div>
                        <div class="trans-zh-char" style="font-size: 16px; font-weight: bold; color: var(--text-poem);">${zh}</div>
                    </div>
                `;
            });

            const shuffledOpts = shuffleArray([...q.options]);
            let optionsHtml = '';
            const letters = ['A', 'B', 'C', 'D'];
            
            shuffledOpts.forEach((opt, idx) => {
                const optPyWords = opt.py.split(/\s+/).filter(p => p.trim() !== '' && !/[，。？！：“”‘’（）；、]/u.test(p));
                const optZhChars = Array.from(opt.text).filter(c => c.trim() !== '');
                let optRubyHtml = '';
                let optPyIdx = 0;
                
                optZhChars.forEach((zh) => {
                    const isPunc = /[，。？！：“”‘’（）；、]/u.test(zh);
                    let currentPy = '&nbsp;';
                    if (!isPunc && optPyIdx < optPyWords.length) {
                        currentPy = optPyWords[optPyIdx];
                        optPyIdx++;
                    }
                    optRubyHtml += `
                        <div class="ruby-item">
                            <div class="trans-py" style="color: #b45309;">${isPunc ? '&nbsp;' : currentPy}</div>
                            <div class="trans-zh-char" style="font-size:14px; color:inherit; font-weight:inherit;">${zh}</div>
                        </div>
                    `;
                });

                optionsHtml += `
                    <button class="option-btn" style="display: block; width: 100%; text-align: left; padding: 12px 15px; margin-bottom: 8px;"
                            data-correct="${opt.correct}" 
                            data-exp-zh="${opt.explanationZh}" 
                            data-exp-en="${opt.explanationEn}" 
                            data-exp-py="${opt.explanationPy}" 
                            data-opt-text="${letters[idx]}. ${opt.text}">
                        <div style="display: flex; align-items: center; gap: 6px;">
                            <span style="font-weight: bold; font-size: 14px; color: var(--text-poem);">${letters[idx]}.</span>
                            <div class="trans-ruby-wrapper">${optRubyHtml}</div>
                        </div>
                        <div class="quiz-option-en" style="font-size: 12px; color: var(--text-secondary); margin-top: 4px; padding-left: 18px; font-style: italic;">${opt.en}</div>
                    </button>
                `;
            });

            const card = document.createElement('div');
            card.className = 'quiz-card';
            card.innerHTML = `
                <div class="question-header" style="margin-bottom: 15px;">
                    <div class="trans-ruby-wrapper">${qRubyHtml}</div>
                    <div class="q-en" style="font-size: 13px; color: var(--text-secondary); margin-top: 4px; font-style: italic;">${q.en}</div>
                </div>
                <div class="options-area">${optionsHtml}</div>
                <div class="feedback" style="margin-top:12px; border-radius:6px; display:none;"></div>
            `;
            container.appendChild(card);
            
            const btns = card.querySelectorAll('.option-btn');
            const fbDiv = card.querySelector('.feedback');
            
            btns.forEach(btn => {
                btn.addEventListener('click', function() {
                    if (this.disabled) return;
                    const isCorrect = this.getAttribute('data-correct') === 'true';
                    const correctOptText = Array.from(btns).find(b => b.getAttribute('data-correct') === 'true')?.getAttribute('data-opt-text') || '';
                    
                    btns.forEach(b => b.disabled = true);
                    fbDiv.style.display = 'block';
                    
                    const expPy = this.getAttribute('data-exp-py');
                    const expZh = this.getAttribute('data-exp-zh');
                    const expEn = this.getAttribute('data-exp-en');
                    
                    const expPyWords = expPy.split(/\s+/).filter(p => p.trim() !== '' && !/[，。？！：“”‘’（）；、！,;.?!"']/u.test(p));
                    const expZhChars = Array.from(expZh).filter(c => c.trim() !== '');
                    let expRubyHtml = '';
                    let expPyIdx = 0;
                    
                    expZhChars.forEach((zh) => {
                        const isPunc = /[，。？！：“”‘’（）；、！,;.?!"']/u.test(zh);
                        let currentPy = '&nbsp;';
                        if (!isPunc && expPyIdx < expPyWords.length) {
                            currentPy = expPyWords[expPyIdx];
                            expPyIdx++;
                        }
                        expRubyHtml += `
                            <div class="ruby-item">
                                <div class="trans-py" style="color:#475569;">${isPunc ? '&nbsp;' : currentPy}</div>
                                <div class="trans-zh-char" style="font-size: 14px; color: inherit;">${zh}</div>
                            </div>
                        `;
                    });

                    if (isCorrect) {
                        this.classList.add('correct');
                        fbDiv.className = 'feedback success';
                        fbDiv.innerHTML = `
                            <div style="font-weight: bold; margin-bottom: 4px;">✅ 回答正确！</div>
                            <div class="trans-ruby-wrapper">${expRubyHtml}</div>
                            <div style="font-size: 12px; color: #166534; margin-top: 4px; font-style: italic;">💬 ${expEn}</div>
                        `;
                    } else {
                        this.classList.add('wrong');
                        fbDiv.className = 'feedback error';
                        fbDiv.innerHTML = `
                            <div style="font-weight: bold; margin-bottom: 4px;">❌ 回答错误。正确答案是：${correctOptText}</div>
                            <div style="font-weight: bold; font-size:13px; margin-top:6px; color:#991b1b; text-indent:0;">💡 选项分析：</div>
                            <div class="trans-ruby-wrapper">${expRubyHtml}</div>
                            <div style="font-size: 12px; color: #991b1b; margin-top: 4px; font-style: italic;">💬 ${expEn}</div>
                        `;
                    }
                });
            });
        });
    }

    // ==================== 5. 简答题特训渲染 ====================
    function renderShortQ() {
        const container = document.getElementById('shortq-content');
        container.innerHTML = '';
        
        shortQQuestions.forEach(q => {
            const qPyWords = q.py.split(/\s+/).filter(p => p.trim() !== '' && !/[，。？！：“”‘’（）；、？0-9.、Q]/u.test(p));
            const qZhChars = Array.from(q.text).filter(c => c.trim() !== '');
            let qRubyHtml = '';
            let qPyIdx = 0;
            
            qZhChars.forEach((zh) => {
                const isPunc = /[，。？！：“”‘’（）；、？0-9.、Q]/u.test(zh);
                let currentPy = '&nbsp;';
                if (!isPunc && qPyIdx < qPyWords.length) {
                    currentPy = qPyWords[qPyIdx];
                    qPyIdx++;
                }
                qRubyHtml += `
                    <div class="ruby-item">
                        <div class="trans-py">${isPunc ? '&nbsp;' : currentPy}</div>
                        <div class="trans-zh-char" style="font-size: 15px; font-weight: bold; color: var(--text-poem);">${zh}</div>
                    </div>
                `;
            });

            // 编译思路的拼音
            const stPyWords = q.strategyPy.split(/\s+/).filter(p => p.trim() !== '' && !/[，。？！：“”‘’（）；、！,;.?!"']/u.test(p));
            const stZhChars = Array.from(q.strategyZh).filter(c => c.trim() !== '');
            let stRubyHtml = '';
            let stPyIdx = 0;
            stZhChars.forEach((zh) => {
                const isPunc = /[，。？！：“”‘’（）；、！,;.?!"']/u.test(zh);
                let currentPy = '&nbsp;';
                if (!isPunc && stPyIdx < stPyWords.length) {
                    currentPy = stPyWords[stPyIdx];
                    stPyIdx++;
                }
                stRubyHtml += `
                    <div class="ruby-item">
                        <div class="trans-py" style="color:#b45309;">${isPunc ? '&nbsp;' : currentPy}</div>
                        <div class="trans-zh-char" style="font-size:13px; color:inherit;">${zh}</div>
                    </div>
                `;
            });

            // 编译标准答案的拼音
            const ansPyWords = q.answerPy.split(/\s+/).filter(p => p.trim() !== '' && !/[，。？！：“”‘’（）；、！,;.?!"']/u.test(p));
            const ansZhChars = Array.from(q.answerZh).filter(c => c.trim() !== '');
            let ansRubyHtml = '';
            let ansPyIdx = 0;
            ansZhChars.forEach((zh) => {
                const isPunc = /[，。？！：“”‘’（）；、！,;.?!"']/u.test(zh);
                let currentPy = '&nbsp;';
                if (!isPunc && ansPyIdx < ansPyWords.length) {
                    currentPy = ansPyWords[ansPyIdx];
                    ansPyIdx++;
                }
                ansRubyHtml += `
                    <div class="ruby-item">
                        <div class="trans-py" style="color:#059669;">${isPunc ? '&nbsp;' : currentPy}</div>
                        <div class="trans-zh-char" style="font-size:14px; color:inherit;">${zh}</div>
                    </div>
                `;
            });

            container.innerHTML += `
                <div class="sa-card">
                    <div class="sa-q-header">
                        <div class="sa-q-num">${q.id}</div>
                        <div style="flex:1;">
                            <div class="trans-ruby-wrapper">${qRubyHtml}</div>
                            <div class="q-en" style="font-size:12px; color:var(--text-secondary); margin-top:4px; font-style:italic;">${q.en}</div>
                        </div>
                    </div>
                    <div class="strategy-box">
                        <div class="strategy-title">💡 答题思路</div>
                        <div class="trans-ruby-wrapper">${stRubyHtml}</div>
                        <div class="strategy-en" style="margin-top:6px; font-size:12px;">${q.strategyEn}</div>
                    </div>
                    <button class="sa-answer-btn" onclick="toggleAnswer(this)">📖 点击查看标准答案</button>
                    <div class="sa-answer-box">
                        <div class="sa-model-answer">
                            <div class="sa-badge">标准答案</div>
                            <div class="trans-ruby-wrapper">${ansRubyHtml}</div>
                            <div class="sa-en" style="margin-top:6px; font-size:13px; font-style:italic;">${q.answerEn}</div>
                        </div>
                    </div>
                </div>
            `;
        });
    }

    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    // ==================== 6. 核心联动交互体系 ====================
    function initCoreInteractions() {
        const translationHeader = document.getElementById('translationHeader');
        const translationContent = document.getElementById('translationContent');
        const toggleIcon = document.getElementById('toggleIcon');
        translationHeader.addEventListener('click', function() {
            if (translationContent.classList.contains('show')) {
                translationContent.classList.remove('show');
                toggleIcon.textContent = '▶';
            } else {
                translationContent.classList.add('show');
                toggleIcon.textContent = '▼';
            }
        });
        
        const pinyinToggle = document.getElementById('pinyin-toggle');
        const enToggle = document.getElementById('en-toggle');
        document.body.classList.add('hide-pinyin', 'hide-english');
        
        pinyinToggle.addEventListener('change', function() { 
            if (this.checked) document.body.classList.remove('hide-pinyin'); 
            else document.body.classList.add('hide-pinyin'); 
        });
        enToggle.addEventListener('change', function() { 
            if (this.checked) document.body.classList.remove('hide-english'); 
            else document.body.classList.add('hide-english'); 
        });
        
        const tooltip = document.getElementById('tooltip');
        const dispWord = document.getElementById('disp-word');
        const dispPinyin = document.getElementById('disp-pinyin');
        const dispZh = document.getElementById('disp-zh');
        const dispEn = document.getElementById('disp-en');
        const examTag = document.getElementById('exam-tag');

        document.getElementById('dynamic-poem-paragraph').addEventListener('click', function(e) {
            const wordBtn = e.target.closest('.word');
            if (!wordBtn) return;
            
            e.stopPropagation();
            document.querySelectorAll('.word').forEach(w => w.classList.remove('active'));
            wordBtn.classList.add('active');
            
            dispWord.innerText = wordBtn.innerText;
            dispPinyin.innerText = wordBtn.getAttribute('data-pinyin');
            dispZh.innerHTML = `<strong>解析：</strong> ${wordBtn.getAttribute('data-zh')}`;
            dispEn.innerText = wordBtn.getAttribute('data-en');
            examTag.style.display = (wordBtn.getAttribute('data-exam') === 'true') ? 'inline-block' : 'none';
            
            tooltip.style.display = 'block';
            const rect = wordBtn.getBoundingClientRect();
            tooltip.style.top = `${rect.top + window.scrollY - tooltip.offsetHeight - 20}px`;
            tooltip.style.left = `${rect.left + window.scrollX + rect.width/2}px`;
            setTimeout(() => tooltip.classList.add('show'), 10);
        });

        document.addEventListener('click', function(e) {
            if (!tooltip.contains(e.target)) {
                tooltip.classList.remove('show');
                document.querySelectorAll('.word').forEach(w => w.classList.remove('active'));
                setTimeout(() => { if (!tooltip.classList.contains('show')) tooltip.style.display = 'none'; }, 300);
            }
        });
     
        const panels = [
            { btnId: 'toggle-analysis-btn', contentId: 'analysis-content', defaultHTML: '<span class="btn-icon">📜</span> 展开全诗赏析', defaultBg: 'linear-gradient(135deg, #10b981, #059669)' },
            { btnId: 'toggle-quiz-btn', contentId: 'quiz-content', defaultHTML: '<span class="btn-icon">🎯</span> 客观题自测', defaultBg: 'linear-gradient(135deg, #3b82f6, #2563eb)' },
            { btnId: 'toggle-shortq-btn', contentId: 'shortq-content', defaultHTML: '<span class="btn-icon">✍️</span> 简答题特训', defaultBg: 'linear-gradient(135deg, #8b5cf6, #6d28d9)' }
        ];
        panels.forEach(panel => {
            const btn = document.getElementById(panel.btnId);
            btn.addEventListener('click', function() {
                const content = document.getElementById(panel.contentId);
                const isOpen = content.style.display === 'block';
                panels.forEach(p => {
                    document.getElementById(p.contentId).style.display = 'none';
                    const pb = document.getElementById(p.btnId);
                    pb.innerHTML = p.defaultHTML;
                    pb.style.background = p.defaultBg;
                });
                if (!isOpen) { 
                    content.style.display = 'block'; 
                    btn.innerHTML = '<span class="btn-icon">⬆️</span> 收起当前面板'; 
                    btn.style.background = '#64748b';
                }
            });
        });
    }

    function toggleAnswer(btn) {
        const answerBox = btn.nextElementSibling;
        if (answerBox.style.display === 'block') {
            answerBox.style.display = 'none';
            btn.innerHTML = '📖 点击查看标准答案';
        } else {
            answerBox.style.display = 'block';
            btn.innerHTML = '📖 收起答案';
        }
    }
    window.toggleAnswer = toggleAnswer;
</script>
</body>
</html>
