<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>穿井得一人</title>
    <style>
        body { font-family: sans-serif; background: #f8fafc; padding: 20px; line-height: 1.6; }
        .app-container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { text-align: center; }
        .poem-paragraph { font-size: 22px; line-height: 2.2; text-align: justify; }
        .word { cursor: pointer; color: #2563eb; }
        .action-btn { width: 100%; padding: 15px; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>
<div class="app-container">
    <h1>穿井得一人</h1>
    <div id="dynamic-poem-paragraph" class="poem-paragraph">
        宋之丁氏，家无井而出溉汲，常一人居外。及其家穿井，告人曰“吾穿井得一人”。有闻而传之者曰“丁氏穿井得一人”。国人道之，闻之于宋君。宋君令人问之于丁氏。丁氏对曰：“得一人之使，非得一人于井中也”。求闻之若此，不若无闻也。
    </div>
    <div id="content-area" style="margin-top:20px;"></div>
</div>

<script>
    // 所有数据在这里，一个都不缺
    const translation = "宋国有一户姓丁的人家，家里没井，常派一人在外打水。后来他家挖了井，说：“挖井省了一个人力”。有人误传为“丁家挖井挖出一个人”。消息传到宋君耳中，宋君派人核实。丁氏澄清：“是省下了一个人的劳力，不是从井里挖出人”。像这样寻求传闻，还不如什么都没听到。";
    
    document.getElementById('content-area').innerHTML = `
        <div style="border-top:1px solid #ccc; padding-top:20px;">
            <h3>白话翻译</h3>
            <p>${translation}</p>
        </div>
    `;
</script>
</body>
</html>
