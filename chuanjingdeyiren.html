<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互动古文平台</title>
    
    <link rel="stylesheet" href="classic_style.css">

    <script src="chuanjingdeyiren_text.js"></script>
    <script src="chuanjingdeyiren_translation.js"></script>
    <script src="chuanjingdeyiren_analysis.js"></script>
    <script src="chuanjingdeyiren_quiz.js"></script>
    <script src="chuanjingdeyiren_shortq.js"></script>
</head>
<body>
 
<div class="app-container">
    <div class="header-section" id="dynamic-header"></div>
    
    <div class="poem-container">
        <div id="dynamic-poem-lines"></div>
        
        <div class="translation-block" id="translationBlock">
            <div class="translation-header" id="translationHeader">
                <div class="translation-title"><span>📖</span> 白话翻译</div>
                <div class="toggle-icon" id="toggleIcon">▶</div>
            </div>
            <div class="translation-content" id="translationContent"></div>
        </div>
    </div>
    
    <div class="controls-wrapper">
        <div class="control-panel"><div class="control-label">🗣️ 拼音辅助 <span>(Pinyin)</span></div><label class="switch"><input type="checkbox" id="pinyin-toggle"><span class="slider"></span></label></div>
        <div class="control-panel"><div class="control-label">🔤 英文辅助 <span>(English)</span></div><label class="switch"><input type="checkbox" id="en-toggle"><span class="slider"></span></label></div>
    </div>

    <div class="action-group">
        <button class="action-btn btn-analysis" id="toggle-analysis-btn"><span class="btn-icon">📜</span> 展开全诗赏析</button>
        <button class="action-btn btn-quiz" id="toggle-quiz-btn"><span class="btn-icon">🎯</span> 客观题自测</button>
        <button class="action-btn btn-shortq" id="toggle-shortq-btn"><span class="btn-icon">✍️</span> 简答题特训</button>
    </div>
 
    <div class="collapsible-content" id="analysis-content"></div>
    
    <div class="collapsible-content" id="quiz-content">
        <div id="quiz-dynamic-container"></div>
    </div>
    
    <div class="collapsible-content" id="shortq-content"></div>
</div>
 
<div class="floating-tooltip" id="tooltip">
    <div class="exp-header"><span class="exp-word" id="disp-word"></span><span class="exp-pinyin" id="disp-pinyin"></span><span class="exam-tag" id="exam-tag">考点</span></div>
    <div class="exp-zh" id="disp-zh"></div>
    <div class="exp-en" id="disp-en"></div>
</div>
 
<script>
    window.onload = function() {
        renderHeaderAndPoem();
        renderTranslation();
        renderAnalysis();
        renderShortQ();
        initCoreInteractions();
    };

    function renderHeaderAndPoem() {
        document.getElementById('dynamic-header').innerHTML = `
            <h1 class="title">${poemData.title}</h1>
            <p class="author">${poemData.author}</p>
        `;
        
        const linesContainer = document.getElementById('dynamic-poem-lines');
        linesContainer.innerHTML = '';
        
        poemData.lines.forEach(line => {
            const lineDiv = document.createElement('div');
            lineDiv.className = 'poem-line';
            const textDiv = document.createElement('div');
            textDiv.className = 'line-text';
            
            line.words.forEach(word => {
                if(word.isPunctuation) {
                    const span = document.createElement('span');
                    span.className = 'punctuation';
                    span.innerText = word.text;
                    textDiv.appendChild(span);
                } else {
                    const span = document.createElement('span');
                    span.className = `word ${word.examFocus ? 'exam-focus' : ''}`;
                    span.innerText = word.text;
                    span.setAttribute('data-pinyin', word.pinyin);
                    span.setAttribute('data-zh', word.zh);
                    span.setAttribute('data-en', word.en);
                    if(word.exam) span.setAttribute('data-exam', 'true');
                    textDiv.appendChild(span);
                }
            });
            lineDiv.appendChild(textDiv);
            linesContainer.appendChild(lineDiv);
        });
    }

    function renderTranslation() {
        const container = document.getElementById('translationContent');
        container.innerHTML = '';
        translationData.forEach((item, index) => {
            container.innerHTML += `
                <div class="trans-text-line">
                    <div class="trans-py">${item.py}</div>
                    <div class="trans-zh">${item.zh}</div>
                    <div class="trans-en">${item.en}</div>
                </div>
                ${index < translationData.length - 1 ? '<div class="trans-divider"></div>' : ''}
            `;
        });
    }

    function renderAnalysis() {
        const container = document.getElementById('analysis-content');
        container.innerHTML = '';
        analysisData.forEach(item => {
            container.innerHTML += `
                <div class="analysis-card">
                    <div class="ana-title-group">
                        <div class="ana-py">${item.py}</div>
                        <div class="ana-header">${item.header}</div>
                        <div class="ana-en">${item.en}</div>
                    </div>
                    <div class="ana-text-group">
                        <div class="ana-py">${item.contentPy}</div>
                        <p class="ana-zh">${item.contentZh}</p>
                        <div class="ana-en">${item.contentEn}</div>
                    </div>
                </div>
            `;
        });
    }

    function renderShortQ() {
        const container = document.getElementById('shortq-content');
        container.innerHTML = '';
        shortQQuestions.forEach(q => {
            container.innerHTML += `
                <div class="sa-card">
                    <div class="sa-q-header">
                        <div class="sa-q-num">${q.id}</div>
                        <div class="q-text-group">
                            <div class="q-py">${q.py}</div>
                            <h4 class="q-zh">${q.text}</h4>
                            <div class="q-en">${q.en}</div>
                        </div>
                    </div>
                    <div class="strategy-box">
                        <div class="strategy-title">💡 答题思路</div>
                        <div class="strategy-py">${q.strategyPy}</div>
                        <div class="strategy-zh">${q.strategyZh}</div>
                        <div class="strategy-en">${q.strategyEn}</div>
                    </div>
                    <button class="sa-answer-btn" onclick="toggleAnswer(this)">📖 点击查看标准答案</button>
                    <div class="sa-answer-box">
                        <div class="sa-model-answer">
                            <div class="sa-badge">标准答案</div>
                            <div class="sa-py">${q.answerPy}</div>
                            <div class="sa-zh">${q.answerZh}</div>
                            <div class="sa-en">${q.answerEn}</div>
                        </div>
                    </div>
                </div>
            `;
        });
    }

    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }
    
    function renderQuizCards() {
        const container = document.getElementById('quiz-dynamic-container');
        if (!container) return;
        container.innerHTML = '';
        quizQuestions.forEach(q => {
            const shuffledOpts = shuffleArray([...q.options]);
            const card = document.createElement('div');
            card.className = 'quiz-card';
            let optionsHtml = '';
            const letters = ['A', 'B', 'C', 'D'];
            shuffledOpts.forEach((opt, idx) => {
                optionsHtml += `
                    <button class="option-btn" data-correct="${opt.correct}" data-explanation-correct="${opt.correct ? opt.explanation : ''}" data-explanation-wrong="${!opt.correct ? opt.explanation : ''}" data-opt-text="${opt.text}">
                        <div class="opt-zh">${letters[idx]}. ${opt.text}</div>
                        <div class="quiz-option-py">${opt.py}</div>
                        <div class="quiz-option-en">${opt.en}</div>
                    </button>
                `;
            });
            card.innerHTML = `
                <div class="question-header">
                    <div class="q-py">${q.py}</div>
                    <h4 class="q-zh">${q.id}. ${q.text}</h4>
                    <div class="q-en">${q.en}</div>
                </div>
                <div class="options-area">${optionsHtml}</div>
                <div class="feedback"></div>
            `;
            container.appendChild(card);
            
            const btns = card.querySelectorAll('.option-btn');
            const fbDiv = card.querySelector('.feedback');
            btns.forEach(btn => {
                btn.addEventListener('click', function() {
                    if (this.disabled) return;
                    const isCorrect = this.getAttribute('data-correct') === 'true';
                    const correctOptText = Array.from(btns).find(b => b.getAttribute('data-correct') === 'true')?.getAttribute('data-opt-text') || '';
                    btns.forEach(b => b.disabled = true);
                    if (isCorrect) {
                        this.classList.add('correct');
                        const explanation = this.getAttribute('data-explanation-correct');
                        fbDiv.className = 'feedback success';
                        fbDiv.innerHTML = `✅ 回答正确！<div class="fb-py">📖 ${explanation}</div><div class="fb-en">💬 Correct: ${explanation}</div>`;
                    } else {
                        this.classList.add('wrong');
                        const wrongExp = this.getAttribute('data-explanation-wrong');
                        const correctBtn = Array.from(btns).find(b => b.getAttribute('data-correct') === 'true');
                        const correctExp = correctBtn ? correctBtn.getAttribute('data-explanation-correct') : "";
                        fbDiv.className = 'feedback error';
                        fbDiv.innerHTML = `❌ 回答错误。正确答案是：${correctOptText}<div class="fb-py">📖 选项分析：${wrongExp}</div><div class="fb-py">📖 正确解析：${correctExp}</div>`;
                    }
                });
            });
        });
    }

    function initCoreInteractions() {
        const translationHeader = document.getElementById('translationHeader');
        const translationContent = document.getElementById('translationContent');
        const toggleIcon = document.getElementById('toggleIcon');
        translationHeader.addEventListener('click', function() {
            if (translationContent.classList.contains('show')) {
                translationContent.classList.remove('show');
                toggleIcon.textContent = '▶';
            } else {
                translationContent.classList.add('show');
                toggleIcon.textContent = '▼';
            }
        });
        
        const pinyinToggle = document.getElementById('pinyin-toggle');
        const enToggle = document.getElementById('en-toggle');
        document.body.classList.add('hide-pinyin', 'hide-english');
        pinyinToggle.addEventListener('change', function() { 
            if (this.checked) document.body.classList.remove('hide-pinyin'); 
            else document.body.classList.add('hide-pinyin'); 
        });
        enToggle.addEventListener('change', function() { 
            if (this.checked) document.body.classList.remove('hide-english'); 
            else document.body.classList.add('hide-english'); 
        });
        
        const tooltip = document.getElementById('tooltip');
        const dispWord = document.getElementById('disp-word');
        const dispPinyin = document.getElementById('disp-pinyin');
        const dispZh = document.getElementById('disp-zh');
        const dispEn = document.getElementById('disp-en');
        const examTag = document.getElementById('exam-tag');

        document.getElementById('dynamic-poem-lines').addEventListener('click', function(e) {
            const wordBtn = e.target.closest('.word');
            if (!wordBtn) return;
            
            e.stopPropagation();
            document.querySelectorAll('.word').forEach(w => w.classList.remove('active'));
            wordBtn.classList.add('active');
            
            dispWord.innerText = wordBtn.innerText;
            dispPinyin.innerText = wordBtn.getAttribute('data-pinyin');
            dispZh.innerHTML = `<strong>解析：</strong> ${wordBtn.getAttribute('data-zh')}`;
            dispEn.innerText = wordBtn.getAttribute('data-en');
            examTag.style.display = (wordBtn.getAttribute('data-exam') === 'true') ? 'inline-block' : 'none';
            
            tooltip.style.display = 'block';
            const rect = wordBtn.getBoundingClientRect();
            tooltip.style.top = `${rect.top + window.scrollY - tooltip.offsetHeight - 20}px`;
            tooltip.style.left = `${rect.left + window.scrollX + rect.width/2}px`;
            setTimeout(() => tooltip.classList.add('show'), 10);
        });

        document.addEventListener('click', function(e) {
            if (!tooltip.contains(e.target)) {
                tooltip.classList.remove('show');
                document.querySelectorAll('.word').forEach(w => w.classList.remove('active'));
                setTimeout(() => { if (!tooltip.classList.contains('show')) tooltip.style.display = 'none'; }, 300);
            }
        });
     
        const panels = [
            { btnId: 'toggle-analysis-btn', contentId: 'analysis-content', defaultHTML: '<span class="btn-icon">📜</span> 展开全诗赏析', defaultBg: 'linear-gradient(135deg, #10b981, #059669)' },
            { btnId: 'toggle-quiz-btn', contentId: 'quiz-content', defaultHTML: '<span class="btn-icon">🎯</span> 客观题自测', defaultBg: 'linear-gradient(135deg, #3b82f6, #2563eb)' },
            { btnId: 'toggle-shortq-btn', contentId: 'shortq-content', defaultHTML: '<span class="btn-icon">✍️</span> 简答题特训', defaultBg: 'linear-gradient(135deg, #8b5cf6, #6d28d9)' }
        ];
        panels.forEach(panel => {
            const btn = document.getElementById(panel.btnId);
            btn.addEventListener('click', function() {
                const content = document.getElementById(panel.contentId);
                const isOpen = content.style.display === 'block';
                panels.forEach(p => {
                    document.getElementById(p.contentId).style.display = 'none';
                    const pb = document.getElementById(p.btnId);
                    pb.innerHTML = p.defaultHTML;
                    pb.style.background = p.defaultBg;
                });
                if (!isOpen) { 
                    content.style.display = 'block'; 
                    btn.innerHTML = '<span class="btn-icon">⬆️</span> 收起当前面板'; 
                    btn.style.background = '#64748b';
                    if (panel.btnId === 'toggle-quiz-btn') renderQuizCards();
                }
            });
        });
    }

    function toggleAnswer(btn) {
        const answerBox = btn.nextElementSibling;
        if (answerBox.style.display === 'block') {
            answerBox.style.display = 'none';
            btn.innerHTML = '📖 点击查看标准答案';
        } else {
            answerBox.style.display = 'block';
            btn.innerHTML = '📖 收起答案';
        }
    }
    window.toggleAnswer = toggleAnswer;
</script>
</body>
</html>
