<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="description" content="互动古文学习：穿井得一人 · 吕氏春秋 · 中英双语·词解版">
    <title>互动古文：穿井得一人 · 吕氏春秋 (中英双语·词解版)</title>
    <link rel="stylesheet" href="classic_style.css">
</head>
<body>

<div class="app-container">
    <div class="header-section">
        <h1 class="title">穿井得一人</h1>
        <p class="author">《吕氏春秋·察今》 / 吕不韦 (先秦)</p>
    </div>
    
    <div class="poem-container" id="poemContainer"></div>
    
    <div class="controls-wrapper">
        <div class="control-panel">
            <div class="control-label">🗣️ 拼音辅助 <span>(Pinyin)</span></div>
            <label class="switch"><input type="checkbox" id="pinyin-toggle"><span class="slider"></span></label>
        </div>
        <div class="control-panel">
            <div class="control-label">🔤 英文辅助 <span>(English)</span></div>
            <label class="switch"><input type="checkbox" id="en-toggle"><span class="slider"></span></label>
        </div>
    </div>
    
    <div class="action-group">
        <button class="action-btn btn-analysis" id="toggle-analysis-btn"><span class="btn-icon">📜</span> 展开全诗赏析</button>
        <button class="action-btn btn-quiz" id="toggle-quiz-btn"><span class="btn-icon">🎯</span> 客观题自测</button>
        <button class="action-btn btn-shortq" id="toggle-shortq-btn"><span class="btn-icon">✍️</span> 简答题特训</button>
    </div>
    
    <div id="analysis-content" class="collapsible-content"></div>
    <div id="quiz-content" class="collapsible-content"></div>
    <div id="shortq-content" class="collapsible-content"></div>
</div>

<div class="floating-tooltip" id="tooltip">
    <div class="exp-header">
        <span class="exp-word" id="disp-word"></span>
        <span class="exp-pinyin" id="disp-pinyin"></span>
        <span class="exam-tag" id="exam-tag">📚 考点</span>
    </div>
    <div class="exp-zh" id="disp-zh"></div>
    <div class="exp-en" id="disp-en"></div>
</div>

<script src="chuanjingdeyiren_text.js"></script>
<script src="chuanjingdeyiren_translation.js"></script>
<script src="chuanjingdeyiren_analysis.js"></script>
<script src="chuanjingdeyiren_quiz.js"></script>
<script src="chuanjingdeyiren_shortq.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        
        function renderPoem() {
            if (!window.poemData) return;
            const container = document.getElementById('poemContainer');
            if (!container) return;
            
            let html = '';
            poemData.lines.forEach((line, lineIdx) => {
                let lineHtml = '<div class="poem-line"><div class="line-text">';
                line.words.forEach(word => {
                    if (word.isPunctuation) {
                        lineHtml += `<span class="punctuation">${word.text}</span>`;
                    } else {
                        const examAttr = word.exam ? 'data-exam="true"' : '';
                        lineHtml += `<span class="word" data-pinyin="${word.pinyin}" data-zh="${(word.zh || '').replace(/"/g, '&quot;')}" data-en="${(word.en || '').replace(/"/g, '&quot;')}" ${examAttr}>${word.text}</span>`;
                    }
                });
                lineHtml += '</div></div>';
                html += lineHtml;
            });
            
            if (window.translationData && window.renderTranslationBlock) {
                html += `<div class="translation-block" id="translationBlock"><div class="translation-header" id="translationHeader"><div class="translation-title"><span>📖</span> 白话翻译</div><div class="toggle-icon" id="toggleIcon">▶</div></div><div class="translation-content" id="translationContent">${window.renderTranslationBlock()}</div></div>`;
            }
            container.innerHTML = html;
        }
        
        function renderAnalysis() {
            const container = document.getElementById('analysis-content');
            if (container && window.renderAllAnalysisCards) container.innerHTML = window.renderAllAnalysisCards();
        }
        
        function renderQuiz() {
            const container = document.getElementById('quiz-content');
            if (container && window.renderAllQuizQuestions) {
                container.innerHTML = window.renderAllQuizQuestions();
                bindQuizEvents();
            }
        }
        
        function bindQuizEvents() {
            document.querySelectorAll('.quiz-card').forEach(card => {
                const btns = card.querySelectorAll('.option-btn');
                const fbDiv = card.querySelector('.feedback');
                btns.forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        if (btn.disabled) return;
                        const isCorrect = btn.getAttribute('data-correct') === 'true';
                        btns.forEach(b => b.disabled = true);
                        if (isCorrect) {
                            btn.classList.add('correct');
                            fbDiv.className = 'feedback success';
                            fbDiv.innerHTML = `✅ 回答正确！<div class="fb-py">📖 ${btn.getAttribute('data-explanation-correct') || '回答正确！'}</div>`;
                        } else {
                            btn.classList.add('wrong');
                            const correctBtn = Array.from(btns).find(b => b.getAttribute('data-correct') === 'true');
                            const correctOptText = correctBtn?.querySelector('.opt-zh')?.innerText || '正确选项';
                            fbDiv.className = 'feedback error';
                            fbDiv.innerHTML = `❌ 回答错误。正确答案是：${correctOptText}<div class="fb-py">📖 ${btn.getAttribute('data-explanation-wrong') || '选项错误'}</div>`;
                        }
                    });
                });
            });
        }
        
        function renderShortQ() {
            const container = document.getElementById('shortq-content');
            if (container && window.renderAllShortQuestions) {
                container.innerHTML = window.renderAllShortQuestions();
                if (window.bindShortAnswerButtons) window.bindShortAnswerButtons();
            }
        }
        
        function initWordTooltip() {
            const tooltip = document.getElementById('tooltip');
            let hideTimeout;
            document.body.addEventListener('click', function(e) {
                const word = e.target.closest('.word');
                if (hideTimeout) clearTimeout(hideTimeout);
                document.querySelectorAll('.word').forEach(w => w.classList.remove('active'));
                if (word) {
                    e.stopPropagation();
                    word.classList.add('active');
                    document.getElementById('disp-word').innerText = word.innerText;
                    document.getElementById('disp-pinyin').innerText = word.getAttribute('data-pinyin') || '';
                    document.getElementById('disp-zh').innerHTML = `<strong>解析：</strong> ${word.getAttribute('data-zh') || '暂无释义'}`;
                    document.getElementById('disp-en').innerText = word.getAttribute('data-en') || 'No definition available.';
                    document.getElementById('exam-tag').style.display = word.getAttribute('data-exam') === 'true' ? 'inline-block' : 'none';
                    tooltip.style.display = 'block';
                    const rect = word.getBoundingClientRect();
                    let top = rect.top + window.scrollY - tooltip.offsetHeight - 15;
                    if (top < 0) top = rect.bottom + window.scrollY + 15;
                    tooltip.style.top = `${top}px`;
                    tooltip.style.left = `${rect.left + window.scrollX + rect.width/2}px`;
                    setTimeout(() => tooltip.classList.add('show'), 10);
                    hideTimeout = setTimeout(() => {
                        tooltip.classList.remove('show');
                        setTimeout(() => { if (!tooltip.classList.contains('show')) tooltip.style.display = 'none'; }, 300);
                    }, 3000);
                } else {
                    tooltip.classList.remove('show');
                    setTimeout(() => { if (!tooltip.classList.contains('show')) tooltip.style.display = 'none'; }, 300);
                }
            });
        }
        
        function initPanelToggle() {
            const panels = [
                { btnId: 'toggle-analysis-btn', contentId: 'analysis-content' },
                { btnId: 'toggle-quiz-btn', contentId: 'quiz-content' },
                { btnId: 'toggle-shortq-btn', contentId: 'shortq-content' }
            ];
            panels.forEach(panel => {
                document.getElementById(panel.btnId)?.addEventListener('click', function() {
                    const content = document.getElementById(panel.contentId);
                    const isOpen = content.style.display === 'block';
                    panels.forEach(p => {
                        document.getElementById(p.contentId).style.display = 'none';
                        const btn = document.getElementById(p.btnId);
                        if (btn) {
                            if (p.btnId === 'toggle-analysis-btn') btn.innerHTML = '<span class="btn-icon">📜</span> 展开全诗赏析';
                            else if (p.btnId === 'toggle-quiz-btn') btn.innerHTML = '<span class="btn-icon">🎯</span> 客观题自测';
                            else btn.innerHTML = '<span class="btn-icon">✍️</span> 简答题特训';
                            btn.style.background = '';
                        }
                    });
                    if (!isOpen) {
                        content.style.display = 'block';
                        if (panel.btnId === 'toggle-analysis-btn') this.innerHTML = '<span class="btn-icon">⬆️</span> 收起全诗赏析';
                        else if (panel.btnId === 'toggle-quiz-btn') this.innerHTML = '<span class="btn-icon">⬆️</span> 收起客观题';
                        else this.innerHTML = '<span class="btn-icon">⬆️</span> 收起简答题';
                        this.style.background = '#64748b';
                    }
                });
            });
        }
        
        function initLanguageToggles() {
            const pinyinToggle = document.getElementById('pinyin-toggle');
            const enToggle = document.getElementById('en-toggle');
            document.body.classList.add('hide-pinyin', 'hide-english');
            pinyinToggle?.addEventListener('change', function() { this.checked ? document.body.classList.remove('hide-pinyin') : document.body.classList.add('hide-pinyin'); });
            enToggle?.addEventListener('change', function() { this.checked ? document.body.classList.remove('hide-english') : document.body.classList.add('hide-english'); });
        }
        
        function initTranslationToggle() {
            document.body.addEventListener('click', function(e) {
                const header = e.target.closest('#translationHeader');
                if (header) {
                    const content = document.getElementById('translationContent');
                    const icon = document.getElementById('toggleIcon');
                    if (content && icon) {
                        if (content.classList.contains('show')) {
                            content.classList.remove('show');
                            icon.textContent = '▶';
                        } else {
                            content.classList.add('show');
                            icon.textContent = '▼';
                        }
                    }
                }
            });
        }
        
        function initShortAnswerDelegation() {
            document.body.addEventListener('click', function(e) {
                const btn = e.target.closest('.sa-answer-btn');
                if (btn) {
                    const answerBox = btn.closest('.sa-card').querySelector('.sa-answer-box');
                    if (answerBox.style.display === 'block') {
                        answerBox.style.display = 'none';
                        btn.innerHTML = '📖 点击查看标准答案';
                    } else {
                        answerBox.style.display = 'block';
                        btn.innerHTML = '📖 收起答案';
                    }
                }
            });
        }
        
        renderPoem();
        renderAnalysis();
        renderQuiz();
        renderShortQ();
        initWordTooltip();
        initPanelToggle();
        initLanguageToggles();
        initTranslationToggle();
        initShortAnswerDelegation();
        console.log('页面初始化完成！');
    });
</script>
</body>
</html>
